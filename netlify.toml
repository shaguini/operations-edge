[build]
  publish = "."

# Redirect www to non-www (or vice versa — adjust to match your DNS setup)
# Uncomment ONE of the following blocks:

# Option A: Redirect naked domain → www
# [[redirects]]
#   from = "https://operationsedge.co.uk/*"
#   to   = "https://www.operationsedge.co.uk/:splat"
#   status = 301
#   force = true

# Option B: Redirect www → naked domain
# [[redirects]]
#   from = "https://www.operationsedge.co.uk/*"
#   to   = "https://operationsedge.co.uk/:splat"
#   status = 301
#   force = true

# Clean URLs: serve /reviews/ for /reviews/index.html etc.
[[redirects]]
  from = "/reviews"
  to   = "/reviews/"
  status = 301

[[redirects]]
  from = "/comparisons"
  to   = "/comparisons/"
  status = 301

[[redirects]]
  from = "/guides"
  to   = "/guides/"
  status = 301

[[redirects]]
  from = "/resources"
  to   = "/resources/"
  status = 301

[[redirects]]
  from = "/contact"
  to   = "/contact/"
  status = 301

[[redirects]]
  from = "/affiliate-disclosure"
  to   = "/affiliate-disclosure/"
  status = 301

[[redirects]]
  from = "/disclaimer"
  to   = "/disclaimer/"
  status = 301

[[redirects]]
  from = "/about"
  to   = "/about/"
  status = 301

# Redirects for /posts/ → /from-the-floor/ (section rename)
[[redirects]]
  from = "/posts/how-we-improved-picking-efficiency.html"
  to   = "/from-the-floor/how-we-improved-picking-efficiency.html"
  status = 301
  force = true

[[redirects]]
  from = "/posts/"
  to   = "/from-the-floor/"
  status = 301
  force = true

[[redirects]]
  from = "/posts"
  to   = "/from-the-floor/"
  status = 301
  force = true

[[redirects]]
  from = "/from-the-floor"
  to   = "/from-the-floor/"
  status = 301

# Custom 404 page
[[redirects]]
  from = "/*"
  to   = "/404.html"
  status = 404

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
